<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Генератор русских букв</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    #letter { font-size: 120px; font-weight: bold; color: #333; }
    button { padding: 16px 32px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h1>Случайная русская буква</h1>
  <div id="letter">?</div>
  <button onclick="generateLetter()">Сгенерировать букву</button>

  <script>
    const letters = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЭЮЯ'.split('');
    function generateLetter() {
      const randomIndex = Math.floor(Math.random() * letters.length);
      document.getElementById('letter').textContent = letters[randomIndex];
    }
  </script>
</body>
</html>
