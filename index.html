<div id="letter-display"></div>

<script>
  async function showLetters() {
    const display = document.getElementById('letter-display');
    const count = 10;
    const delay = 300; 
    const targetLetter = 'A'; 

    const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    display.textContent = '';

    for (let i = 0; i < count; i++) {
      const randomLetter = String.fromCharCode(65 + Math.floor(Math.random() * 26));
      
      display.textContent = randomLetter;

      await wait(delay);
    }

    display.textContent = targetLetter;
  }

  document.addEventListener('DOMContentLoaded', showLetters);
</script>
