<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Генератор букв</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }
    #letter {
      font-size: 150px;
      font-weight: bold;
      color: #2c3e50;
      margin: 20px 0;
    }
    button {
      padding: 15px 30px;
      font-size: 20px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2980b9;
    }
    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <h1>Игра в слова</h1>
  <div id="letter">?</div>
  <button id="btn" onclick="startGen()">Сгенерировать букву</button>

  <script>
    const letters = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЭЮЯ'.split('');
    const display = document.getElementById('letter');
    const btn = document.getElementById('btn');

    async function startGen() {
      btn.disabled = true;
      
      for (let i = 0; i < 8; i++) {
        const rand = Math.floor(Math.random() * letters.length);
        display.textContent = letters[rand];
        await new Promise(r => setTimeout(r, 100));
      }

      const final = Math.floor(Math.random() * letters.length);
      display.textContent = letters[final];
      
      btn.disabled = false;
    }
  </script>
</body>
</html>
